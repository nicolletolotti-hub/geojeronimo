<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento Defesa Civil - São Jerônimo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: calc(100vh - 70px); margin-top: 70px; background: #f0f0f0; }
        
        /* Cabeçalho Profissional */
        .header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: #00274d; color: white; display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; box-sizing: border-box;
        }

        /* Painel de Controle */
        .control-panel {
            position: fixed; top: 90px; right: 20px;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 260px; z-index: 1000;
        }

        .cota-badge {
            background: #e1f5fe; color: #0288d1;
            padding: 10px; border-radius: 8px;
            text-align: center; font-size: 1.2em; font-weight: bold;
            margin: 10px 0; border: 1px solid #b3e5fc;
        }

        input[type=range] { width: 100%; cursor: pointer; }
        
        .status-real { font-size: 0.85em; color: #4caf50; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div><strong>DEFESA CIVIL</strong> | SÃO JERÔNIMO</div>
        <div style="text-align: right;">
            <span id="data-atual" style="font-size: 0.8em; display: block;"></span>
            <span class="status-real">● NÍVEL EM TEMPO REAL: <span id="nivel-sgb">2.45</span>m</span>
        </div>
    </div>

    <div class="control-panel">
        <label style="font-weight: bold; color: #333;">Simulador de Inundação</label>
        <div class="cota-badge"><span id="txt-cota">2.45</span> m</div>
        <input type="range" id="slider-agua" min="0.8" max="15" step="0.1" value="2.45">
        
        <p style="font-size: 0.75em; color: #666; line-height: 1.4; margin-top: 15px;">
            * A mancha azul representa as áreas atingidas conforme a topografia local.
        </p>
    </div>

    <div id="map"></div>

    <script>
    // 1. Configuração do Mapa
    var map = L.map('map').setView([-29.962, -51.695], 14);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 2. A Mancha de Inundação
    var imgBounds = [[-29.9915,-51.8148],[-29.9470,-51.6498]];
    var layerMancha = L.imageOverlay('images/output_hh_1.png', imgBounds, {
        opacity: 0.3, 
        zIndex: 500
    }).addTo(map);

    // 3. Função de Zoom ao clicar
    function zoomToFeature(e) {
        var layer = e.target;
        map.fitBounds(layer.getBounds(), {
            padding: [50, 50], // Espaço de respiro nas bordas
            maxZoom: 16        // Não deixa dar zoom demais e perder o contexto
        });
    }

    // 4. Camada de Bairros com Interatividade
    var layerBairros;
    if (typeof json_bairros_sj_3 !== 'undefined') {
        layerBairros = L.geoJson(json_bairros_sj_3, {
            style: { 
                color: '#333', 
                weight: 2, 
                fillOpacity: 0.1,
                dashArray: '3' // Deixa a linha do bairro pontilhada para ficar mais leve
            },
            onEachFeature: function(feature, layer) {
                // Adiciona o nome do bairro ao passar o mouse
                layer.bindTooltip(feature.properties.nome);
                
                // Eventos de mouse
                layer.on({
                    click: zoomToFeature, // O ZOOM ACONTECE AQUI
                    mouseover: function(e) {
                        this.setStyle({ fillOpacity: 0.3, weight: 3 });
                    },
                    mouseout: function(e) {
                        layerBairros.resetStyle(e.target);
                    }
                });
            }
        }).addTo(map);
    }

    // 5. Lógica do Slider (Mantida e Melhorada)
    const slider = document.getElementById('slider-agua');
    const txtCota = document.getElementById('txt-cota');

    slider.addEventListener('input', function() {
        var cota = parseFloat(this.value);
        txtCota.innerHTML = cota.toFixed(2);

        // Ajuste da Mancha
        if (layerMancha) {
            var novaOpacidade = (cota / 15); 
            if (cota <= 1.0) novaOpacidade = 0;
            layerMancha.setOpacity(Math.min(novaOpacidade, 0.8));
        }

        // Alerta Visual nos Bairros
        if (layerBairros) {
            layerBairros.eachLayer(function(l) {
                var cMin = l.feature.properties.cota_minima;
                if (cMin && cota >= cMin) {
                    l.setStyle({ fillColor: '#d90429', fillOpacity: 0.4 });
                } else {
                    l.setStyle({ fillColor: '#333', fillOpacity: 0.1 });
                }
            });
        }
    });

    document.getElementById('data-atual').innerHTML = new Date().toLocaleDateString('pt-BR');
</script>
</body>
</html>
