<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <style>
            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
            #map { top: 60px !important; height: calc(100vh - 60px) !important; }
            .controles {
                position: fixed; top: 80px; right: 20px; 
                background: white; padding: 15px; border-radius: 8px; 
                z-index: 1000; box-shadow: 0 0 10px rgba(0,0,0,0.3);
                width: 220px; font-family: sans-serif;
            }
        </style>
        <title>Defesa Civil - Simulação</title>
    </head>
    <body>
        <div style="position: fixed; top: 0; width: 100%; height: 60px; background: #00274d; color: white; display: flex; align-items: center; padding: 0 20px; z-index: 1000; font-family: sans-serif;">
            <strong>DEFESA CIVIL | SÃO JERÔNIMO</strong>
        </div>

        <div class="controles">
            <label style="font-weight: bold;">Cota Simulada:</label>
            <input type="range" id="slider-agua" min="0" max="15" step="0.1" value="0.8" style="width: 100%; margin: 10px 0;">
            <div style="text-align: center; font-size: 2em; font-weight: bold; color: #0077b6;">
                <span id="txt-cota-simulada">0.8</span>m
            </div>
        </div>

        <div id="map"></div>

        <script src="js/leaflet.js"></script>
        <script src="ruas_2.js"></script>
        <script src="bairros_sj_3.js"></script>

        <script>
        // 1. Inicializa o Mapa
        var map = L.map('map').setView([-29.96, -51.69], 14);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Carrega a Mancha (Verifique se a pasta se chama 'images' ou 'data')
        var img_bounds = [[-29.99152776666667,-51.814861122222226],[-29.947083322222227,-51.64986112222223]];
        var layer_mancha = L.imageOverlay('images/output_hh_1.png', img_bounds, {
            opacity: 0.0,
            zIndex: 400
        }).addTo(map);

        // 3. Carrega Bairros
        var layer_bairros = L.geoJson(json_bairros_sj_3, {
            style: { color: '#3388ff', weight: 1, fillOpacity: 0.1 }
        }).addTo(map);

        // 4. LÓGICA DO SLIDER (O CORAÇÃO DO SITE)
        const slider = document.getElementById('slider-agua');
        const display = document.getElementById('txt-cota-simulada');

        slider.oninput = function() {
            var valor = parseFloat(this.value);
            display.innerHTML = valor.toFixed(2); // Atualiza o texto na tela

            // Faz a mancha aparecer proporcionalmente
            // Se o nível for baixo (ex: 1m), opacidade é quase 0. Se for 15m, opacidade é 0.8
            if (valor > 1.0) {
                var novaOpacidade = (valor / 15);
                layer_mancha.setOpacity(Math.min(novaOpacidade, 0.8));
            } else {
                layer_mancha.setOpacity(0);
            }

            // Pinta os bairros de vermelho se a cota for atingida
            layer_bairros.eachLayer(function(layer) {
                var cotaBairro = parseFloat(layer.feature.properties['cota_minima']);
                if (valor >= cotaBairro && cotaBairro > 0) {
                    layer.setStyle({ fillColor: '#ff0000', fillOpacity: 0.5 });
                } else {
                    layer.setStyle({ fillColor: '#3388ff', fillOpacity: 0.1 });
                }
            });
        };
        </script>
    </body>
</html>
